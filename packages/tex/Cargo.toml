[package]
name = "ixion-tex"
version = "0.0.1"
edition = "2024"

[lib]
crate-type = ["cdylib"]

[dependencies]
anyhow = "1.0.100"
napi = { version = "3.3.0", default-features = false, features = ["async", "napi4", "tokio_rt"] }
napi-derive = "3.2.5"
ravif = "0.11.20"
rgb = "0.8.52"
texture2ddecoder = "0.1.2"
tokio = { version = "1.48.0", features = ["rt"] }
webp = "0.3.1"

[build-dependencies]
napi-build = "2.3.0"
