name: CI

on:
  schedule:
    # Run at 16:00 UTC+8 every Tuesday (08:00 UTC)
    - cron: "0 8 * * 2"
  workflow_dispatch:
    inputs:
      skip_update:
        description: "Skip update step"
        default: false
        type: boolean
      force_release:
        description: "Force release"
        default: false
        type: boolean

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          submodules: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - uses: ilammy/setup-nasm@v1

      - name: Install dependencies
        run: pnpm install

      - name: Build project
        run: pnpm build

      - name: Run CI update command
        if: inputs.skip_update != true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
          MINIO_BUCKET_NAME: ${{ secrets.MINIO_BUCKET_NAME }}
          MINIO_PREFIX: ${{ secrets.MINIO_PREFIX }}
          FORCE_RELEASE: ${{ inputs.force_release && '--force-release' || '' }}
        run: |
          node packages/cli/dist/index.js ci init
          node packages/cli/dist/index.js ci update ${{ env.FORCE_RELEASE }}

      - name: Prepare CLI artifact
        run: |
          rm -rf .ci/ixion-cli
          pnpm --filter @ffcafe/ixion-cli deploy --prod --legacy .ci/ixion-cli/packages/cli
          mkdir -p .ci/ixion-cli/lib/SaintCoinach/SaintCoinach/Definitions
          mkdir -p .ci/ixion-cli/lib/EXDSchema
          cp package.json .ci/ixion-cli/package.json
          cp .ixion-config.ci.json .ci/ixion-cli/.ixion-config.ci.json
          cp lib/SaintCoinach/SaintCoinach/Definitions/*.json .ci/ixion-cli/lib/SaintCoinach/SaintCoinach/Definitions/
          cp lib/EXDSchema/*.yml .ci/ixion-cli/lib/EXDSchema/
          rm -rf .ci/ixion-cli/packages/cli/node_modules/.pnpm/node_modules/@ffcafe/ixion-cli
          tar -C .ci/ixion-cli -cf .ci/ixion-cli.tar .
          mkdir -p .ci/ixion-cli-smoke
          tar -C .ci/ixion-cli-smoke -xf .ci/ixion-cli.tar
          node -e "import('./.ci/ixion-cli-smoke/packages/cli/node_modules/@ffcafe/ixion-storage/dist/index.js').then(() => console.log('artifact smoke test ok'))"
          rm -rf .ci/ixion-cli-smoke

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ixion-cli
          include-hidden-files: true
          path: .ci/ixion-cli.tar

  update-xivstrings:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Trigger xivstrings update
        env:
          XIVSTRINGS_ROOT: ${{ secrets.XIVSTRINGS_ROOT }}
          XIVSTRINGS_UPDATE_TOKEN: ${{ secrets.XIVSTRINGS_UPDATE_TOKEN }}
        run: node scripts/trigger-xivstrings-update.mjs

  datamining-cn:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ixion-cli

      - name: Extract CLI artifact
        run: tar -xf ixion-cli.tar

      - uses: actions/checkout@v5
        with:
          repository: thewakingsands/ffxiv-datamining-cn
          path: ffxiv-datamining-cn
          ssh-key: ${{ secrets.SSH_KEY }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Run datamining command
        id: export-csv
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
          MINIO_BUCKET_NAME: ${{ secrets.MINIO_BUCKET_NAME }}
          MINIO_PREFIX: ${{ secrets.MINIO_PREFIX }}
        run: |
          node packages/cli/dist/index.js ci init
          node packages/cli/dist/index.js exd export-csv ffxiv-datamining-cn -s sdo --crlf

      - name: Commit
        uses: EndBug/add-and-commit@v9
        with:
          cwd: ffxiv-datamining-cn
          default_author: github_actions
          author_name: FFCAFE Automation
          message: "ver ${{ steps.export-csv.outputs.version }}"
          tag: "ver-${{ steps.export-csv.outputs.version }} --force"
          tag_push: "--force"

  datamining-tc:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: ixion-cli

      - name: Extract CLI artifact
        run: tar -xf ixion-cli.tar

      - uses: actions/checkout@v5
        with:
          repository: thewakingsands/ffxiv-datamining-tc
          path: ffxiv-datamining-tc
          ssh-key: ${{ secrets.SSH_KEY_TC }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Run datamining command
        id: export-csv
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MINIO_ENDPOINT: ${{ secrets.MINIO_ENDPOINT }}
          MINIO_ACCESS_KEY: ${{ secrets.MINIO_ACCESS_KEY }}
          MINIO_SECRET_KEY: ${{ secrets.MINIO_SECRET_KEY }}
          MINIO_BUCKET_NAME: ${{ secrets.MINIO_BUCKET_NAME }}
          MINIO_PREFIX: ${{ secrets.MINIO_PREFIX }}
        run: |
          node packages/cli/dist/index.js ci init
          node packages/cli/dist/index.js exd export-csv ffxiv-datamining-tc -s userjoy --crlf

      - name: Commit
        uses: EndBug/add-and-commit@v9
        with:
          cwd: ffxiv-datamining-tc
          default_author: github_actions
          author_name: FFCAFE Automation
          message: "ver ${{ steps.export-csv.outputs.version }}"
          tag: "ver-${{ steps.export-csv.outputs.version }} --force"
          tag_push: "--force"
